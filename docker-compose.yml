services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    hostname: postiz
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    expose:
      - 5000
    networks:
      - postiz-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    hostname: postiz-postgres
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    restart: always
    hostname: postiz-redis
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    hostname: temporal-elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - postiz-network
    expose:
      - 9200
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    hostname: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - postiz-network
    expose:
      - 5432
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    hostname: temporal
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=/tmp/dynamicconfig.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - postiz-network
    entrypoint: ["/bin/sh", "-c", "printf 'limit.maxIDLength:\n  - value: 255\n    constraints: {}\n' > /tmp/dynamicconfig.yaml && exec /etc/temporal/entrypoint.sh"]
    expose:
      - 7233

  temporal-ui:
    image: temporalio/ui:2.34.0
    hostname: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - postiz-network
    expose:
      - 8080

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-es-data:
  temporal-pg-data:

networks:
  postiz-network:
